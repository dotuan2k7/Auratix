<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticketbox Clone - 2 Tabs</title>
    <link rel="stylesheet" href="css.css">
</head>
<body>

    <header class="top-header">
        <div class="container header-content">
            <div class="logo" id="logo-home" title="Nhấn để quay về Trang chủ">ticketbox</div>
            <div class="search-box">
                <input type="text" placeholder="Bạn tìm gì hôm nay?">
                <button>Tìm kiếm</button>
            </div>
            <div class="user-actions">
                <button class="btn-outline">Tạo sự kiện</button>
                <span>Vé của tôi</span>
                <span>Đăng nhập | Đăng ký</span>
            </div>
        </div>
    </header>

    <nav class="main-nav">
        <div class="container nav-list">
            <a href="#" class="nav-item">Nhạc sống</a>
            <a href="#" class="nav-item">Sân khấu & Nghệ thuật</a>
            <a href="#" class="nav-item">Thể Thao</a> 
            <a href="#" class="nav-item">Hội thảo & Workshop</a>
            <a href="#" class="nav-item">Tham quan & Trải nghiệm</a>
            <a href="#" class="nav-item">Khác</a>
            <a href="#" class="nav-item">Vé bán lại</a>
            <a href="#" class="nav-item">Blog</a>
        </div>
    </nav>

    <main class="container">
        
        <section id="tab-home" class="view-section">
            <div class="hero-banners">
                <div class="image-wrapper hero-img">
                    <img src="https://placehold.co/800x400/2ecc71/ffffff?text=Banner+Cẩm+Nang" alt="Banner">
                </div>
                <div class="image-wrapper hero-img">
                    <img src="https://placehold.co/800x400/1a1a2e/ffffff?text=Concert+9" alt="Banner">
                </div>
            </div>

            <h2 class="section-title">Sự kiện đặc biệt</h2>
            <div class="event-row">
                <div class="event-card">
                    <div class="image-wrapper card-img">
                        <img src="https://placehold.co/300x450/e74c3c/ffffff?text=Kịch+Lịch+Sử" alt="Event">
                    </div>
                </div>
                <div class="event-card">
                    <div class="image-wrapper card-img">
                        <img src="https://placehold.co/300x450/f39c12/ffffff?text=Ca+Sĩ+1" alt="Event">
                    </div>
                </div>
                <div class="event-card">
                    <div class="image-wrapper card-img">
                        <img src="https://placehold.co/300x450/9b59b6/ffffff?text=Ca+Sĩ+2" alt="Event">
                    </div>
                </div>
                <div class="event-card">
                    <div class="image-wrapper card-img">
                        <img src="https://placehold.co/300x450/3498db/ffffff?text=Super+Star" alt="Event">
                    </div>
                </div>
            </div>
        </section>


        
    </main>

    
</body>
</html>
